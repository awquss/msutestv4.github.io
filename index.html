<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSÜ Senaryo Planlama Web Arayüzü</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap");

    :root {
      --bg-1: #04100c;
      --bg-2: #0d1e17;
      --card: #0e1713;
      --line: #254336;
      --text: #d7f8df;
      --accent: #2e9f72;
      --control-height: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 10%, rgba(188, 59, 59, 0.2) 0 18%, transparent 34%),
        radial-gradient(circle at 86% 84%, rgba(46, 159, 114, 0.22) 0 16%, transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
    }

    .shell {
      width: min(760px, 100%);
      border: 2px solid var(--line);
      background: var(--card);
      box-shadow: 10px 10px 0 #020504;
      padding: clamp(20px, 5vw, 34px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .logo-wrap img {
      width: min(160px, 28vw);
      height: auto;
      display: block;
    }

    h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.6rem, 3vw, 2.1rem);
      margin-bottom: 18px;
      line-height: 1.1;
      text-align: center;
      white-space: nowrap;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .actions a {
      display: block;
      text-decoration: none;
      border: 2px solid var(--line);
      min-height: var(--control-height);
      padding: 10px 16px;
      color: var(--text);
      background: #14231c;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      line-height: 1.2;
    }

    .actions a:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #030705;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="logo-wrap">
      <img src="./data/MilliSavunmaUniversitesiLogo.png" alt="MSÜ Logo">
    </div>
    <h1>MSÜ Senaryo Planlama WEB Arayüzü</h1>
    <section class="actions">
      <a href="./html/senaryo.html?freshSession=1&appVersion=20260326">Yeni Senaryo Oluşturma</a>
      <a href="./html/senaryo-duzenleme.html?appVersion=20260326">Senaryo Düzenleme</a>
    </section>
  </main>
</body>
</html>
